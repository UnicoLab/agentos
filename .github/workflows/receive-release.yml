name: Receive Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release to Public Repo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Generate GitHub App token for cross-repo access
      - name: Generate app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TECHNICAL_APP_APP_ID }}
          private-key: ${{ secrets.TECHNICAL_APP_PEM }}
          owner: UnicoLab
          repositories: |
            ul_aiflow_AgentOS

      - name: Download release assets from private repo
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          PRIVATE_REPO="UnicoLab/ul_aiflow_AgentOS"

          echo "📦 Downloading release ${TAG} from ${PRIVATE_REPO}..."
          mkdir -p release-assets

          # Download all release assets
          gh release download "${TAG}" \
            --repo "${PRIVATE_REPO}" \
            --dir ./release-assets \
            --skip-existing

          echo "✅ Downloaded assets:"
          ls -la release-assets/

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"

          cat > /tmp/release-notes.md << 'NOTES'
          ## ⚡ Quick Install

          **macOS / Linux:**
          ```bash
          curl -fsSL https://unicolab.github.io/agentos/install.sh | sh
          ```

          **Windows:**
          ```powershell
          curl -fsSL https://unicolab.github.io/agentos/install.bat -o install.bat && install.bat
          ```

          Or just **double-click** the included launcher script — no terminal needed.

          ---

          ### 🎩 Choose Your Flavour

          | Flavour | Install Command |
          |---------|----------------|
          | 🎩 **Jean-Pierre — PM** (default) | `curl ... \| sh` |
          | 🛒 **Retail Ops** | `curl ... \| sh -s -- --flavour retail` |
          | 🏢 **Office Assistant** | `curl ... \| sh -s -- --flavour office` |

          > All flavours install as `agentos` — same commands: `agentos serve`, `agentos chat`, etc.

          ### 🔑 License

          Email **[info@unicolab.ai](mailto:info@unicolab.ai)** for a free testing license.

          📖 **Docs:** [unicolab.github.io/agentos](https://unicolab.github.io/agentos)
          NOTES

          gh release create "${TAG}" ./release-assets/* \
            --title "AgentOS ${TAG}" \
            --notes-file /tmp/release-notes.md

          echo "✅ Public release ${TAG} created!"

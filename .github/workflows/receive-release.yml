name: Receive Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release to Public Repo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Generate GitHub App token for cross-repo access
      - name: Generate app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TECHNICAL_APP_APP_ID }}
          private-key: ${{ secrets.TECHNICAL_APP_PEM }}
          owner: UnicoLab
          repositories: |
            ul_aiflow_AgentOS

      # ── Resolve flavour and version from dispatch payload ──
      - name: Resolve release metadata
        id: resolve
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          FLAVOUR="${{ github.event.client_payload.flavour }}"
          VERSION="${{ github.event.client_payload.version }}"

          # Fallback: parse tag if flavour/version not in payload (backward compat)
          if [ -z "$FLAVOUR" ]; then
            if [[ "$TAG" == */v* ]]; then
              FLAVOUR="${TAG%%/v*}"
            else
              FLAVOUR="all"
            fi
          fi
          if [ -z "$VERSION" ]; then
            if [[ "$TAG" == */v* ]]; then
              VERSION="${TAG#*/}"
            else
              VERSION="$TAG"
            fi
          fi

          # Determine display info
          case "$FLAVOUR" in
            pm)         DISPLAY="🎩 Jean-Pierre — PM" ;;
            freelancer) DISPLAY="💼 Yvette — Freelancer PM" ;;
            retail)     DISPLAY="🛒 Retail Ops" ;;
            office)     DISPLAY="🏢 Office Assistant" ;;
            all)        DISPLAY="📦 All Flavours" ;;
            *)          DISPLAY="$FLAVOUR" ;;
          esac

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "flavour=${FLAVOUR}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "display=${DISPLAY}" >> "$GITHUB_OUTPUT"

          echo "📦 Release: flavour=${FLAVOUR} version=${VERSION} tag=${TAG}"

      - name: Download release assets from private repo
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          PRIVATE_REPO="UnicoLab/ul_aiflow_AgentOS"

          echo "📦 Downloading release ${TAG} from ${PRIVATE_REPO}..."
          mkdir -p release-assets

          # Download all release assets
          gh release download "${TAG}" \
            --repo "${PRIVATE_REPO}" \
            --dir ./release-assets \
            --skip-existing

          echo "✅ Downloaded assets:"
          ls -la release-assets/

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          FLAVOUR="${{ steps.resolve.outputs.flavour }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          DISPLAY="${{ steps.resolve.outputs.display }}"

          # Build flavour-aware release notes
          if [ "$FLAVOUR" = "all" ]; then
            TITLE="AgentOS ${VERSION}"
            INSTALL_CMD="curl -fsSL https://unicolab.github.io/agentos/install.sh | sh"
            FLAVOUR_TABLE="| Flavour | Install Command |
          |---------|----------------|
          | 🎩 **Jean-Pierre — PM** (default) | \`curl ... \| sh\` |
          | 💼 **Yvette — Freelancer PM** | \`curl ... \| sh -s -- --flavour freelancer\` |
          | 🛒 **Retail Ops** | \`curl ... \| sh -s -- --flavour retail\` |
          | 🏢 **Office Assistant** | \`curl ... \| sh -s -- --flavour office\` |"
          else
            TITLE="AgentOS ${DISPLAY} ${VERSION}"
            INSTALL_CMD="curl -fsSL https://unicolab.github.io/agentos/install.sh | sh -s -- --flavour ${FLAVOUR}"
            FLAVOUR_TABLE=""
          fi

          cat > /tmp/release-notes.md << NOTES
          ## ${DISPLAY} — ${VERSION}

          ### ⚡ Quick Install

          **macOS / Linux:**
          \`\`\`bash
          ${INSTALL_CMD}
          \`\`\`

          **Windows:**
          \`\`\`powershell
          curl -fsSL https://unicolab.github.io/agentos/install.bat -o install.bat && install.bat${FLAVOUR:+ --flavour ${FLAVOUR}}
          \`\`\`

          Or just **double-click** the included launcher script — no terminal needed.

          ---

          ${FLAVOUR_TABLE:+### 🎩 Choose Your Flavour

          ${FLAVOUR_TABLE}

          > All flavours install as \`agentos\` — same commands: \`agentos serve\`, \`agentos chat\`, etc.

          ---}

          ### 🔑 License

          Email **[info@unicolab.ai](mailto:info@unicolab.ai)** for a free testing license.

          📖 **Docs:** [unicolab.github.io/agentos](https://unicolab.github.io/agentos)
          NOTES

          gh release create "${TAG}" ./release-assets/* \
            --title "${TITLE}" \
            --notes-file /tmp/release-notes.md

          echo "✅ Public release ${TAG} (${DISPLAY}) created!"

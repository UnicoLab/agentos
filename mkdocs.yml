site_name: AgentOS — AI Automation for PM & Analytics
site_url: https://unicolab.github.io/agentos
site_description: "We automate manual reporting and analytics workflows — saving PMs 10+ hrs/week and data teams 15+ hrs/week. Runs 100% on your machine. Free pilot in 2-3 weeks."
site_author: UnicoLab
repo_url: https://github.com/UnicoLab/agentos
repo_name: UnicoLab/agentos

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-happy-outline
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - header.autohide

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UnicoLab
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/unicolab
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - See It In Action: demo.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Configuration: getting-started/configuration.md
  - What We Automate:
      - Overview: flavors/index.md
      - "🎩 PM Reporting — Jean-Pierre": flavors/jean-pierre.md
      - "🔬 Analytics — Michelle": flavors/michelle.md
  - Features:
      # Core Intelligence (Platform)
      - AI Copilot: features/ai-copilot.md
      - Self-Evolving Memory: features/self-evolving-memory.md
      - Recipe Composer: features/recipes.md
      # Jean-Pierre (PM)
      - Dashboard: features/dashboard.md
      - Standup Scribe: features/standup-scribe.md
      - Sprint Forge: features/sprint-forge.md
      - Delivery Pulse: features/delivery-pulse.md
      - Retro Intelligence: features/retro-intelligence.md
      - Tasks: features/tasks.md
      - Roadmap: features/roadmap.md
      # Team & Portfolio (PM)
      - Team Pulse: features/team-pulse.md
      - Fleet View: features/fleet-view.md
      - Strategic Canvas: features/canvas.md
      - Dependency Radar: features/dependency-radar.md
      # Automation & Productivity
      - Automation Hub: features/automation-hub.md
      - Meeting Notes: features/meeting-notes.md
      - Integrations: features/integrations.md
  - Guides:
      - Ollama Setup: guides/ollama-setup.md
      - GitHub Setup: guides/github-setup.md
      - Jira Setup: guides/jira-setup.md
      - Slack Setup: guides/slack-setup.md
      - AIFlow Integration: guides/aiflow-sync.md
      - Background Service: guides/background-service.md
  - Reference:
      - CLI Commands: reference/cli.md
      - API Endpoints: reference/api.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
  - Security & Privacy: security.md
  - License & Evaluation: license.md

copyright: "Built with ❤️ by <a href='https://unicolab.ai'>UnicoLab</a> · &copy; 2024–2026 UnicoLab. All rights reserved."


name: Receive Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release to Public Repo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Generate GitHub App token for cross-repo access
      - name: Generate app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TECHNICAL_APP_APP_ID }}
          private-key: ${{ secrets.TECHNICAL_APP_PEM }}
          owner: UnicoLab
          repositories: |
            ul_aiflow_AgentOS

      - name: Download release assets from private repo
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          PRIVATE_REPO="UnicoLab/ul_aiflow_AgentOS"

          echo "📦 Downloading release ${TAG} from ${PRIVATE_REPO}..."
          mkdir -p release-assets

          # Download all release assets
          gh release download "${TAG}" \
            --repo "${PRIVATE_REPO}" \
            --dir ./release-assets \
            --skip-existing

          echo "✅ Downloaded assets:"
          ls -la release-assets/

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          VERSION="${TAG#v}"  # Remove 'v' prefix for display

          # Create release notes
          cat > /tmp/release-notes.md << 'NOTES'
          ## AgentOS — Multi-Flavour Release

          Cross-platform binaries for macOS (Apple Silicon + Intel), Linux, and Windows.

          ### 🎩 Available Flavours

          | Flavour | Binary | Description |
          |---------|--------|-------------|
          | 🎩 **Jean-Pierre — The PM** | `agentos-pm` | Project management copilot (GitHub + Jira + Slack) |
          | 🛒 **Retail Ops** | `agentos-retail` | Inventory & retail analytics assistant |
          | 🏢 **Office Assistant** | `agentos-office` | Document management & workflow automation |

          ### ⚡ One-Line Install

          **macOS / Linux:**
          \`\`\`bash
          # Default (PM flavour)
          curl -fsSL https://unicolab.github.io/agentos/install.sh | sh

          # Choose a flavour:
          curl -fsSL https://unicolab.github.io/agentos/install.sh | sh -s -- --flavour retail
          curl -fsSL https://unicolab.github.io/agentos/install.sh | sh -s -- --flavour office
          \`\`\`

          **Windows:**
          \`\`\`powershell
          curl -fsSL https://unicolab.github.io/agentos/install.bat -o install.bat && install.bat
          \`\`\`

          > The installer renames the binary to \`agentos\` — all commands stay the same: \`agentos serve\`, \`agentos chat\`, etc.

          ### 🖱️ Double-Click Launchers

          Every download includes launcher scripts — **no terminal needed**:
          - **macOS:** \`Start AgentOS.command\`
          - **Windows:** \`Start AgentOS.bat\`
          - **Linux:** \`start-agentos.sh\`

          ### 🔑 License

          Email [info@unicolab.ai](mailto:info@unicolab.ai) for a **free testing license**.

          ### 📖 Documentation

          **[unicolab.github.io/agentos](https://unicolab.github.io/agentos)**

          ---
          Built with ❤️ by [UnicoLab](https://unicolab.ai)
          NOTES

          # Create the release with all assets (--clobber handles re-releases)
          gh release create "${TAG}" ./release-assets/* \
            --title "AgentOS ${TAG}" \
            --notes-file /tmp/release-notes.md

          echo "✅ Public release ${TAG} created!"
